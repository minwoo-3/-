<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>시맨틱구조보기</title>
<style>
    html, body { margin: 0; padding: 0; height: 100%;}
    header { width:100%;height:15%;background: yellow;}
    nav { width:15%;height:70%;float:left;background:skyblue;}
    section { width:70%;height:70%;float:left;background:green;}
    aside { width:15%;height:70%;float:left;background:gray;}
    footer { width:100%;height:15%;clear:both;background:violet;}
</style>
</head>
<body>
  <header>header영역</header>
  <nav>nav영역</nav>
  <section>section영역</section>
  <aside>aside영역</aside>
  <footer>footer영역</footer>  
</body>
</html>
